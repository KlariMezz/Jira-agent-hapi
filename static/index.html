<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jira Agent — HAPI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F4F5F7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 520px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .logo-icon { width: 36px; height: 36px; background: #0052CC; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 20px; height: 20px; fill: white; }
  .logo-text h1 { font-size: 16px; font-weight: 600; color: #172B4D; }
  .logo-text p { font-size: 12px; color: #6B778C; }
  .field { margin-bottom: 1rem; }
  label { display: block; font-size: 12px; font-weight: 600; color: #6B778C; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  input, select, textarea { width: 100%; padding: 8px 12px; border: 2px solid #DFE1E6; border-radius: 6px; font-size: 14px; color: #172B4D; outline: none; transition: border-color 0.15s; font-family: inherit; }
  input:focus, select:focus, textarea:focus { border-color: #0052CC; }
  textarea { resize: vertical; min-height: 80px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn { width: 100%; padding: 10px; background: #0052CC; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background 0.15s; }
  .btn:hover { background: #0747A6; }
  .btn:disabled { background: #B3D4FF; cursor: not-allowed; }
  .result { margin-top: 1rem; padding: 12px; border-radius: 6px; font-size: 14px; display: none; }
  .result.success { background: #E3FCEF; color: #006644; border: 1px solid #ABF5D1; }
  .result.error { background: #FFEBE6; color: #BF2600; border: 1px solid #FFBDAD; }
  .result a { color: #0052CC; font-weight: 600; }
  .divider { border: none; border-top: 1px solid #DFE1E6; margin: 1.5rem 0; }
  .history-title { font-size: 12px; font-weight: 600; color: #6B778C; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .history-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #F4F5F7; }
  .history-item:last-child { border-bottom: none; }
  .history-key { font-size: 12px; font-weight: 600; color: #0052CC; min-width: 65px; }
  .history-text { font-size: 13px; color: #172B4D; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
  .badge-high { background: #FFEFD5; color: #974F0C; }
  .badge-medium { background: #E6F1FB; color: #0747A6; }
  .badge-low { background: #E3FCEF; color: #006644; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M11.75 2.1c-.3 0-.57.17-.7.44L7.93 8.28l-5.74.84a.79.79 0 0 0-.44 1.35l4.15 4.05-.98 5.71a.79.79 0 0 0 1.15.83L12 18.15l5.13 2.7a.79.79 0 0 0 1.15-.84l-.98-5.7 4.15-4.05a.79.79 0 0 0-.44-1.35l-5.74-.84-2.57-5.03a.79.79 0 0 0-.71-.44z"/></svg>
    </div>
    <div class="logo-text">
      <h1>Jira Agent</h1>
      <p>HAPI · dius-team.atlassian.net</p>
    </div>
  </div>

  <div class="field">
    <label>Popis tasku *</label>
    <textarea id="summary" placeholder="Napr. Opraviť bug v login formulári na mobile..."></textarea>
  </div>

  <div class="row">
    <div class="field">
      <label>Priorita</label>
      <select id="priority">
        <option value="High">High</option>
        <option value="Medium" selected>Medium</option>
        <option value="Low">Low</option>
      </select>
    </div>
    <div class="field">
      <label>Typ</label>
      <select id="issueType">
        <option value="Úloha">Úloha</option>
        <option value="Podúloha">Podúloha</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Asignee</label>
      <select id="assignee">
        <option value="klara">Klara</option>
        <option value="emma">Emma</option>
        <option value="diana">Diana</option>
      </select>
    </div>
    <div class="field">
      <label>Deadline</label>
      <input type="date" id="dueDate">
    </div>
  </div>

  <button class="btn" id="submitBtn" onclick="createTicket()">Vytvor Jira ticket</button>

  <div class="result" id="result"></div>

  <div id="historySection" style="display:none;">
    <hr class="divider">
    <div class="history-title">Vytvorené dnes</div>
    <div id="historyList"></div>
  </div>
</div>

<script>
let history = [];

async function createTicket() {
  const summary = document.getElementById("summary").value.trim();
  if (!summary) { alert("Zadaj popis tasku!"); return; }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "Vytvára sa...";

  const payload = {
    summary,
    priority: document.getElementById("priority").value,
    issueType: document.getElementById("issueType").value,
    assignee: document.getElementById("assignee").value,
    dueDate: document.getElementById("dueDate").value
  };

  try {
    const r = await fetch("/create", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    const resultEl = document.getElementById("result");
    resultEl.style.display = "block";

    if (r.ok) {
      resultEl.className = "result success";
      resultEl.innerHTML = "✅ Ticket vytvorený! <a href='" + d.url + "' target='_blank'>" + d.key + "</a>";
      history.unshift({ key: d.key, url: d.url, summary, priority: payload.priority });
      updateHistory();
      document.getElementById("summary").value = "";
      document.getElementById("dueDate").value = "";
    } else {
      resultEl.className = "result error";
      resultEl.textContent = "❌ Chyba: " + (d.error || "Neznáma chyba");
    }
  } catch(e) {
    const resultEl = document.getElementById("result");
    resultEl.style.display = "block";
    resultEl.className = "result error";
    resultEl.textContent = "❌ Chyba pripojenia: " + e.message;
  }

  btn.disabled = false;
  btn.textContent = "Vytvor Jira ticket";
}

function updateHistory() {
  if (history.length === 0) return;
  document.getElementById("historySection").style.display = "block";
  document.getElementById("historyList").innerHTML = history.slice(0,5).map(t => `
    <div class="history-item">
      <a class="history-key" href="${t.url}" target="_blank">${t.key}</a>
      <span class="history-text">${t.summary}</span>
      <span class="badge badge-${t.priority.toLowerCase()}">${t.priority}</span>
    </div>
  `).join("");
}

document.getElementById("summary").addEventListener("keydown", e => {
  if (e.key === "Enter" && e.metaKey) createTicket();
});
</script>
</body>
</html>
